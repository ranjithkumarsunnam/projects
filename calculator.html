<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css"/>
</head>
<body>
    <div class="container">
        <h1>Calculator</h1>
        <input type="number" id="num1" placeholder="Enter Number First">
        <input type="number" id="num2" placeholder="Enter Number Second">
        <br><br>
        <button onclick="calculator('+')">+</button>
        <button onclick="calculator('-')">-</button>
        <button onclick="calculator('*')">*</button>
        <button onclick="calculator('/')">/</button>
        <h2 id="result">Result:</h2>
</div>
<script src="calculator.js"></script>
    
</body>
</html>
